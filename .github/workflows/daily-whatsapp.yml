name: Daily WhatsApp Message

on:
  schedule:
    # GitHub's clock is UTC. Sri Lanka is UTC+5:30.
    # 04:00 UTC  =  9:30 AM Sri Lanka time.
    - cron: "0 4 * * *"
  workflow_dispatch:   # lets you also run it manually from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send the daily message
        run: python send_daily.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
